general.import = [
  "~/.config/alacritty/catppuccin-mocha.toml"
]

[window]
padding = { x = 12, y = 12 }
decorations = "full"
opacity = 0.8
blur = true
dynamic_title = true

[font]
normal = { family = "FiraCode Nerd Font Propo", style = "Regular" }
size = 11.0

