# font_family      monospace
# bold_font        auto
# italic_font      auto
# bold_italic_font auto

tab_bar_min_tabs            1
tab_bar_edge                bottom
tab_bar_style               powerline
tab_powerline_style         slanted
tab_title_template          {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}

scrollback_lines 10000
scrollback_pager_history_size 10

# Theme selection through includes
# include themes/mocha.conf
include themes/oledppuccin.conf
# include themes/rose-pine.conf

# BEGIN_KITTY_FONTS
font_family      family="Maple Mono NF CN"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
# symbol_map U+30A0-U+30FF,U+3041-U+309F,U+FF66-U+FF9F "Source Han Sans JP"

# TRANSPARENCY
dynamic_background_opacity yes
background_opacity 0.9
# background_blur 16

# Cursor trail for fun
cursor_trail 1
